services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aether-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      USE_EXTERNAL_STORES: "true"
      POSTGRES_DSN: postgresql://aether:aether@postgres:5432/aether
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aether-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      USE_EXTERNAL_STORES: "true"
      POSTGRES_DSN: postgresql://aether:aether@postgres:5432/aether
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
    command: ["uv", "run", "python", "scripts/worker.py"]
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    container_name: aether-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aether
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aether"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: aether-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5.26-community
    container_name: aether-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  redis:
    image: redis:8-alpine
    container_name: aether-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
